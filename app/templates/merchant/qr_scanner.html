<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner - Fidelitree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body class="bg-black min-h-screen flex flex-col font-sans">

    <div class="p-6 bg-slate-900 flex justify-between items-center text-white">
        <h2 class="font-bold">Scannerizza Treecard</h2>
        <a href="/merchant/dashboard" class="text-xs bg-slate-800 px-3 py-2 rounded-lg">Chiudi</a>
    </div>

    <div class="flex-1 flex flex-col items-center justify-center p-6">
        <div id="reader-container" class="relative w-full max-w-sm">
            <div id="reader"
                class="w-full overflow-hidden rounded-[2.5rem] border-4 border-green-500 shadow-[0_0_30px_rgba(34,197,94,0.3)]">
            </div>
            <!-- Overlay di caricamento -->
            <div id="camera-loading"
                class="absolute inset-0 flex items-center justify-center bg-slate-900 rounded-[2.5rem]">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-500"></div>
            </div>
        </div>

        <div id="camera-error"
            class="hidden mt-6 bg-red-500/10 border border-red-500 text-red-500 p-4 rounded-2xl text-sm font-bold flex flex-col items-center gap-2">
            <span>⚠️ Errore Fotocamera</span>
            <p id="error-detail" class="text-xs font-normal text-center">Assicurati di aver dato i permessi e di usare
                HTTPS.</p>
            <button onclick="location.reload()"
                class="mt-2 bg-red-500 text-white px-4 py-2 rounded-xl text-xs">Riprova</button>
        </div>
    </div>

    <div class="p-10 bg-slate-900 text-center text-slate-400">
        <p class="text-sm">Inquadra il QR code del cliente per caricare i Treepoints</p>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const qrCodeSuccessCallback = (decodedText, decodedResult) => {
            // Vibrazione per feedback (se supportata)
            if (navigator.vibrate) navigator.vibrate(200);

            // Reindirizzamento corretto per le rotte merchant
            if (decodedText.startsWith("http")) {
                // Se l'URL è https://.../card/ID lo trasformiamo in https://.../merchant/card/ID/manage
                const newUrl = decodedText.replace("/card/", "/merchant/card/") + "/manage";
                window.location.href = newUrl;
            } else {
                // Se è solo un ID, costruiamo l'URL completo
                window.location.href = "/merchant/card/" + decodedText + "/manage";
            }
        };

        const config = { fps: 15, qrbox: { width: 250, height: 250 } };

        // Avvio fotocamera posteriore
        html5QrCode.start({ facingMode: "environment" }, config, qrCodeSuccessCallback)
            .then(() => {
                document.getElementById("camera-loading").classList.add("hidden");
            })
            .catch((err) => {
                console.error("Errore avvio fotocamera:", err);
                document.getElementById("camera-loading").classList.add("hidden");
                document.getElementById("camera-error").classList.remove("hidden");
                document.getElementById("error-detail").innerText = err;
            });
    </script>
</body>

</html>
