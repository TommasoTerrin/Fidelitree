<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benvenuto in Fidelitree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .float-icon {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>

<body class="bg-slate-50 font-sans min-h-screen flex flex-col items-center justify-center p-6 text-slate-800">

    <div class="max-w-md w-full text-center space-y-8">

        <div class="relative inline-block">
            <div class="bg-green-100 p-8 rounded-full float-icon">
                <span class="text-6xl">🌳</span>
            </div>
            <div class="absolute -bottom-2 -right-2 bg-white shadow-lg rounded-full p-2">
                <span class="text-2xl">✨</span>
            </div>
        </div>

        <div class="space-y-3">
            <h1 class="text-4xl font-black tracking-tight text-slate-900">
                Fiducia che <span class="text-green-600">Cresce</span>
            </h1>
            <p class="text-lg text-slate-500 leading-relaxed">
                Ottieni la tua <b>Treecard</b> digitale. Ogni acquisto qui si trasforma in un albero vero piantato per
                il pianeta.
            </p>
        </div>

        <div class="bg-white border border-slate-200 rounded-3xl p-6 shadow-xl transform -rotate-2 scale-95 opacity-90">
            <div class="flex justify-between items-center mb-4">
                <div class="h-8 w-24 bg-slate-200 rounded"></div>
                <div class="h-4 w-4 bg-green-500 rounded-full"></div>
            </div>
            <div class="space-y-2 text-left">
                <div class="h-3 w-3/4 bg-slate-100 rounded"></div>
                <div class="h-3 w-1/2 bg-slate-100 rounded"></div>
            </div>
            <div class="mt-6 flex justify-center">
                <div class="h-20 w-20 bg-slate-100 rounded-lg flex items-center justify-center text-slate-300 text-xs">
                    QR PREVIEW</div>
            </div>
        </div>

        <div class="pt-4 space-y-4">
            <form action="/get-card" method="POST">
                <button type="submit"
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-black text-xl py-5 rounded-2xl shadow-lg shadow-green-200 transition-all active:scale-95">
                    OTTIENI TREECARD GRATIS
                </button>
            </form>
            <p class="text-xs text-slate-400 font-medium uppercase tracking-widest">
                Senza App • Gratuita • Impatto Reale
            </p>
        </div>

        <footer class="pt-10">
            <div class="flex justify-center items-center gap-2 opacity-30 grayscale">
                <img src="/static/logo_light.jpg" alt="Fidelitree" class="h-6">
                <span class="font-bold text-sm">fidelitree.io</span>
            </div>
        </footer>
    </div>

</body>

</html>
